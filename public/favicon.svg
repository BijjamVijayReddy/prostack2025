<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy rounded square background -->
  <rect width="32" height="32" rx="6" fill="#1a1f36"/>

  <!-- Three chevrons >>> growing in size left to right (matching ProStack logo) -->
  <!-- Chevron 1 — smallest, tightest -->
  <path d="M4 13 L8 16 L4 19"
    stroke="#f97316" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Chevron 2 — medium -->
  <path d="M11 11.5 L16 16 L11 20.5"
    stroke="#f97316" stroke-width="2.4"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Chevron 3 — largest -->
  <path d="M18.5 9.5 L25 16 L18.5 22.5"
    stroke="#f97316" stroke-width="2.6"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>